<span (click)="clickEvent($event)">
  <div class="search-container">
    <form (submit)="onSearch()">
      <div
        id="additionalFiltersMenu"
        [ngClass]="
          checkTheFilter('additionalFiltersMenu') ? 'menu ' : 'menu hidden'
        "
      >
        <app-real-estate-additional-filters
          (closeMenu)="onCloseAdditionalFiltersMenu(undefined)"
        ></app-real-estate-additional-filters>
      </div>
      <div class="Search-bar">
        <span class="desktop">
          <app-sub-search-query-box />
        </span>

        <div class="menu-container">
          <button
            class="search-button hover-btn-background"
            type="button"
            (click)="toggleMenu('tradeTypeMenu')"
          >
            {{ advertisementTypeButtonText }}
            <i
              id="tradeTypeArrow"
              [ngClass]="
                checkTheFilter('tradeTypeMenu')
                  ? 'material-icons arrow-up'
                  : 'material-icons'
              "
              >keyboard_arrow_down</i
            >
          </button>
          <div
            id="tradeTypeMenu"
            [ngClass]="
              checkTheFilter('tradeTypeMenu')
                ? 'menu  dropdown-menu'
                : 'menu hidden dropdown-menu'
            "
          >
            <button
              class="type-btn"
              type="button"
              (click)="applyFilter('מכירה'); toggleMenu('tradeTypeMenu')"
            >
              <span [ngClass]="this.searchService.forSale() ? 'font500' : ''">
                מכירה
              </span>
              <span>
                @if (this.searchService.forSale()) {
                  <img
                    class="svg-icon"
                    src="assets/images/check-orange.svg"
                    alt="check"
                  />
                }
              </span>
            </button>
            <button
              class="type-btn"
              type="button"
              (click)="applyFilter('השכרה'); toggleMenu('tradeTypeMenu')"
            >
              <span [ngClass]="this.searchService.forRent() ? 'font500' : ''">
                השכרה
              </span>
              @if (this.searchService.forRent()) {
                <img
                  class="svg-icon"
                  src="assets/images/check-orange.svg"
                  alt="check"
                />
              }
            </button>
          </div>
        </div>

        <div class="menu-container">
          <button
            [ngClass]="
              propertyTypeFilterValue === 'סוג הנכס'
                ? 'search-button hover-btn-background'
                : 'search-button hover-btn-background search-button-selected'
            "
            type="button"
            (click)="toggleMenu('propertyTypeMenu')"
          >
            {{ propertyTypeFilterValue }}

            <i
              id="propertyTypeArrow"
              [ngClass]="
                checkTheFilter('propertyTypeMenu')
                  ? 'material-icons arrow-up'
                  : 'material-icons'
              "
              >keyboard_arrow_down</i
            >
          </button>
          <div
            id="propertyTypeMenu"
            [ngClass]="
              checkTheFilter('propertyTypeMenu') ? 'menu ' : 'menu hidden'
            "
          >
            <app-real-estate-property-type
              (propertyTypeSelected)="onPropertyTypeSelected($event)"
            ></app-real-estate-property-type>
          </div>
        </div>
        <div class="menu-container">
          <button
            #priceSliderButton
            (click)="toggleMenu('priceSlider')"
            [ngClass]="
              priceRangeFilterValue === 'מחיר'
                ? 'search-button hover-btn-background'
                : 'search-button hover-btn-background search-button-selected price-range'
            "
            type="button"
          >
            @if (priceRangeFilterValue !== "מחיר") {
              <span class="price-range">
                {{ priceRangeFilterValue }}
              </span>
            } @else {
              {{ priceRangeFilterValue }}
            }
            <i
              id="PriceRangeArrow"
              [ngClass]="
                checkTheFilter('priceSlider')
                  ? 'material-icons arrow-up'
                  : 'material-icons'
              "
              >keyboard_arrow_down</i
            >
          </button>
          <div
            id="PriceRangeMenu"
            [ngClass]="checkTheFilter('priceSlider') ? 'menu ' : 'menu hidden'"
          >
            <app-real-estate-price-slider
              (selectedPriceRange)="onPriceRangeSelected($event)"
            ></app-real-estate-price-slider>
          </div>
        </div>

        <div class="menu-container">
          <button
            (click)="toggleMenu('roomsAmountMenu')"
            id="propertyRoomButton"
            class="search-button hover-btn-background"
            [ngClass]="
              roomNumberFilterValue === 'חדרים'
                ? 'search-button hover-btn-background'
                : 'search-button hover-btn-background search-button-selected'
            "
            type="button"
          >
            {{ roomNumberFilterValue }}
            <i
              id="propertyRoomArrow"
              [ngClass]="
                checkTheFilter('roomsAmountMenu')
                  ? 'material-icons arrow-up'
                  : 'material-icons'
              "
              >keyboard_arrow_down</i
            >
          </button>
          <div
            id="propertyRoomMenu"
            [ngClass]="
              checkTheFilter('roomsAmountMenu') ? 'menu ' : 'menu hidden'
            "
          >
            <app-real-estate-rooms-amount
              id="roomsAmountFilter"
              (propertyRoomSelected)="onRoomsAmountSelected($event)"
            ></app-real-estate-rooms-amount>
          </div>
        </div>

        <div class="menu-container">
          <button
            id="additionalFiltersButton"
            (click)="toggleMenu('additionalFiltersMenu')"
            class="search-button hover-btn-background"
            type="button"
          >
            <img
              id="additionalFiltersArrow"
              src="assets/images/filter-alt-2-svgrepo-com.svg"
              class="type-pic"
              alt="additional-Filters-Arrow"
            />
            <div class="space"></div>

            סינונים נוספים
          </button>
        </div>

        <button
          (click)="searchService.addLastSearchToDB(); toggleMenu('')"
          class="search-button-orange"
          type="submit"
        >
          חיפוש
        </button>
        <button class="search-button alert-btn" type="button">
          <div class="">
            <img class="bell-img" src="assets/images/bell.svg" alt="" />
          </div>
          <div>יצירת התראה</div>
        </button>
      </div>
    </form>
  </div>
  <span class="mobile">
    <div class="mobile-search-header">
      <button
        (click)="toggleMenu('additionalFiltersMenu')"
        type="button"
        class="icon-btn left"
        aria-label="סינון"
      >
        <img
          class="svg-icon-sort-filter"
          src="assets/images/sort-filter.svg"
          alt="sort filter"
        />
      </button>

      <div class="title-wrap">
        <span class="title">{{ title }}</span>
      </div>
      <span class="history-btn">
        <button type="button" class="icon-btn right" aria-label="היסטוריה">
          <img
            class="svg-icon-history"
            src="assets/images/history.svg"
            alt="history"
          />
        </button>
      </span>
    </div>
  </span>

  <div class="title">{{ title }}</div>
  <span class="mobile padding-right">
    <ng-container *ngTemplateOutlet="projectTitleTpl"></ng-container>
  </span>
  <div span class="ads-container">
    <span class="desktop">
      <ng-container *ngTemplateOutlet="projectTitleTpl"></ng-container>
      <ng-template #projectTitleTpl>
        <div class="project-container">
          <div class="project-title">
            <div class="project-div left-side">
              <img
                class="arrow_left"
                src="assets/images/left-arrow-svgrepo-com.svg"
                alt="arrow_left"
              />
              <span style="font-weight: 400">לכל הפרויקטים</span>
            </div>
            <div class="project-div">
              <span style="font-weight: 400"> פרויקטים חדשים </span>
              <img
                class="logo-img"
                src="assets/images/logo-yad-blue.svg"
                alt=""
              />
            </div>
          </div>
        </div>
      </ng-template>
    </span>
    <span class="ads">
      <div class="ad" *ngFor="let ad of searchService.adds; let i = index">
        <div class="new-poject-text font500">פרויקט חדש</div>
        <img [src]="ad.pic" alt="image" />
        <div class="content">
          <div class="ad-title">{{ ad.title }}</div>
          <div class="ad-city">{{ ad.city }}</div>
          <div class="ad-project">{{ ad.program }}</div>
        </div>

        @if (hideMatIcon(i)) {
          <span class="desktop">
            <mat-icon
              (click)="toggleFavoriteAd(i)"
              aria-hidden="false"
              aria-label="Example home icon"
              fontIcon="favorite_border"
              [ngClass]="
                clickedIndex[i] === i ? 'like-button-selected' : 'like-button'
              "
            ></mat-icon>
            <mat-icon
              aria-hidden="false"
              aria-label="Example home icon"
              fontIcon="favorite"
              [ngClass]="
                clickedIndex[i] === i
                  ? 'like-button-sm-selected'
                  : 'like-button-sm'
              "
            ></mat-icon>
          </span>
        }
      </div>
    </span>
  </div>

  <app-real-estate-results></app-real-estate-results>
</span>
